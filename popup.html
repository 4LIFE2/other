<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    width: 320px; padding: 14px; margin: 0;
    background: #fafafa;
  }
  h1 { font-size: 14px; margin: 0 0 10px; color: #222; letter-spacing: -0.01em; }
  .status {
    padding: 10px 12px; border-radius: 8px; background: #ececec;
    margin-bottom: 10px; font-size: 12px; color: #444;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; flex-shrink: 0; }
  .status.recording { background: #fde7e7; color: #8a1a1a; }
  .status.recording .dot { background: #d33; box-shadow: 0 0 0 0 rgba(211,51,51,0.6); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211,51,51,0.6); } 70% { box-shadow: 0 0 0 8px rgba(211,51,51,0); } 100% { box-shadow: 0 0 0 0 rgba(211,51,51,0); } }
  button {
    width: 100%; padding: 9px; margin-bottom: 6px; border: 0; border-radius: 8px;
    cursor: pointer; font-weight: 600; font-size: 13px;
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.05); }
  button:active { filter: brightness(0.95); }
  .start { background: #1f8a3a; color: white; }
  .stop  { background: #b81f1f; color: white; }
  .secondary { background: #e3e3e3; color: #222; }
  .meta { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.5; }
  .meta b { color: #222; }
</style>
</head>
<body>
  <h1>Interaction Recorder</h1>
  <div id="status" class="status"><span class="dot"></span><span id="statusText">Idle</span></div>
  <button id="start" class="start">Start Recording</button>
  <button id="stop" class="stop" style="display:none">Stop Recording</button>
  <button id="export" class="secondary">Export Sessions (JSON)</button>
  <button id="clear" class="secondary">Clear Stored Sessions</button>
  <div class="meta">
    Actions captured this session: <b id="count">0</b><br>
    Stored sessions: <b id="sessionCount">0</b>
  </div>
  <script src="popup.js"></script>
</body>
</html>
