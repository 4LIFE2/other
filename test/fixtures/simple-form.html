<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Form Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 60px auto; padding: 0 16px; }
    label { display: block; margin: 12px 0 4px; font-size: 13px; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 14px; width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #1f8a3a; color: white; font-weight: 600; cursor: pointer; }
    .out { margin-top: 16px; font-size: 13px; color: #2a6; min-height: 1em; }
  </style>
</head>
<body>
  <h1>Sign in</h1>
  <form id="login" data-testid="login-form">
    <label for="email">Email</label>
    <input id="email" name="email" type="text" autocomplete="off" data-testid="email-input">

    <label for="pw">Password</label>
    <input id="pw" name="pw" type="password" autocomplete="off" data-testid="password-input">

    <button id="submit-btn" data-testid="submit-btn" type="submit" aria-label="Sign in">Sign in</button>
  </form>
  <div id="out" class="out" aria-live="polite"></div>
  <script>
    document.getElementById('login').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      document.getElementById('out').textContent = 'Welcome, ' + email;
    });
  </script>
</body>
</html>
